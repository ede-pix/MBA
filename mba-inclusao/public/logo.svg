<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#5A9BD5"/>
  
  <!-- Lotus Leaves -->
  <path d="M50 70 
           C 25 70, 10 90, 15 95 
           C 35 90, 45 80, 50 75 
           C 55 80, 65 90, 85 95 
           C 90 90, 75 70, 50 70 Z" 
        fill="#FFFFFF"/>
        
  <!-- Base Leaf Shadows -->
  <path d="M25 85 C 40 95, 60 95, 75 85 C 65 92, 35 92, 25 85 Z" fill="#FFFFFF"/>

  <!-- Brain Vector Form (Simplified minimal version) -->
  <path d="M35 50 
           C 25 50, 25 35, 35 30 
           C 35 15, 50 20, 50 20 
           C 50 20, 65 15, 65 30 
           C 75 35, 75 50, 65 50 
           C 70 65, 55 65, 50 55 
           C 45 65, 30 65, 35 50 
           Z" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- Brain Central Stem -->
  <line x1="50" y1="20" x2="50" y2="65" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Brain folds left -->
  <path d="M 45 30 C 35 30 35 40 45 40" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M 45 45 C 35 45 35 55 45 55" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>

  <!-- Brain folds right -->
  <path d="M 55 30 C 65 30 65 40 55 40" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M 55 45 C 65 45 65 55 55 55" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
</svg>
